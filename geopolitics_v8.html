// Robust JSON extractor - pulls first valid JSON object from any response
function extractJSON(text) {
  if (!text) throw new Error('Empty response');
  // Strip markdown fences
  let clean = text.replace(/```json|```/g, '').trim();
  // Try direct parse first
  try { return JSON.parse(clean); } catch {}
  // Find first { and matching }
  const start = clean.indexOf('{');
  if (start === -1) throw new Error('No JSON object found in response');
  let depth = 0, inStr = false, esc = false;
  for (let i = start; i < clean.length; i++) {
    const ch = clean[i];
    if (esc) { esc = false; continue; }
    if (ch === '\\') { esc = true; continue; }
    if (ch === '"') inStr = !inStr;
    if (inStr) continue;
    if (ch === '{') depth++;
    else if (ch === '}') {
      depth--;
      if (depth === 0) {
        const candidate = clean.slice(start, i + 1);
        try { return JSON.parse(candidate); }
        catch (e) { throw new Error('Malformed JSON: ' + e.message); }
      }
    }
  }
  throw new Error('Unterminated JSON (response may have been truncated)');
}

function pickTheme(country, year) {
  const c = (country || '').toLowerCase();
  if (c.includes('soviet') || c.includes('ussr') || c.includes('russia') && year >= 1917 && year <= 1991) return 'soviet';
  if (year >= 1946 && year <= 1991) return 'cold_west';
  if (year >= 1939 && year <= 1945) return 'wwii';
  if (year >= 1910 && year <= 1938) return 'victorian';
  if (year >= 2000) return 'modern';
  return 'default';
}

// ============ MAIN APP ============

function App() {
  const [screen, setScreen] = useState('menu'); // menu, loading, game
  const [campaign, setCampaign] = useState(null);
  const [saved, setSaved] = useState([]);

  useEffect(() => {
    (async () => {
      try {
        const list = await window.storage.list('campaign:');
        if (list && list.keys) {
          const loaded = [];
          for (const k of list.keys) {
            try {
              const r = await window.storage.get(k);
              if (r) loaded.push({ key: k, data: JSON.parse(r.value) });
            } catch {}
          }
          setSaved(loaded);
        }
      } catch {}
    })();
  }, []);

  const loadCampaign = (data) => {
    setCampaign(data);
    setScreen('game');
  };

  if (screen === 'menu') return <MainMenu onStart={(c) => { setCampaign(c); setScreen('game'); }} saved={saved} onLoad={loadCampaign} />;
  if (screen === 'loading') return <LoadingScreen />;
  return <Game campaign={campaign} onExit={() => { setCampaign(null); setScreen('menu'); }} setCampaign={setCampaign} />;
}

  const [scenario, setScenario] = useState('historical');
  const [premise, setPremise] = useState('');
  const [turnDuration, setTurnDuration] = useState('1 week');
  const [building, setBuilding] = useState(false);
  const [error, setError] = useState('');

  const [rawDebug, setRawDebug] = useState('');

  const startGame = async () => {
    if (!country.trim()) { setError('Country required.'); return; }
    setBuilding(true);
    setError('');
    setRawDebug('');

    const themeKey = pickTheme(country, year);

    const exampleJSON = {
      date: "1985-01-01",
      player_country: "Union of Soviet Socialist Republics",
      leader: "Konstantin Chernenko, General Secretary of the CPSU",
      capital: "Moscow",
      government_type: "One-party Marxist-Leninist state",
      population_millions: 278,
      gdp_tier: "Superpower",
      allies: ["Warsaw Pact members", "Cuba", "Vietnam", "Syria"],
      rivals: ["United States", "NATO", "China"],
      military_strength: "Superpower",
      nuclear_status: "Superpower arsenal",
      starting_situation: "Chernenko is visibly ailing and the Politburo is restless. The war in Afghanistan grinds on. SDI and Pershing II deployments have hardened confrontation with Washington.",
      key_concerns: ["Succession uncertainty", "Afghanistan quagmire", "Economic stagnation", "SDI arms race"],
      military_units: {
        ground: ["1st Guards Tank Army", "8th Guards Army", "40th Army (Afghanistan)", "GSFG in East Germany", "Airborne VDV divisions"],
        naval: ["Northern Fleet", "Pacific Fleet", "Kirov-class cruisers", "Typhoon-class SSBNs", "Oscar-class SSGNs"],
        air: ["MiG-29 Fulcrum squadrons", "Su-27 Flanker squadrons", "Tu-95 Bear bombers", "Tu-160 Blackjack", "Frontal Aviation regiments"],
        space: ["Salyut/Mir program", "Molniya comms satellites", "Zenit recon satellites"],
        cbrn: ["Large ICBM force", "Strategic Rocket Forces", "Tactical nuclear stockpile"]
      },
      initial_events: [
        "Konstantin Chernenko makes a rare public appearance, fueling succession speculation in Western capitals",
        "Soviet forces launch new offensive in the Panjshir Valley against Ahmad Shah Massoud",
        "Geneva arms control talks resume after 15-month suspension",
        "US announces continued funding for Strategic Defense Initiative research",
        "Polish authorities arrest Solidarity activists in Gdansk"
      ]
    };

    const userMsg = `CRITICAL INSTRUCTION: Your response must begin with the character { and end with }. You are a JSON-emitting API endpoint. Any character other than valid JSON in your response will cause a system failure. Do NOT write any headers, titles, explanations, markdown, code fences, or commentary. ONLY emit raw JSON.

You are populating the initial game state for a turn-based geopolitical strategy simulation. The player controls ${country} in ${year}. Scenario: ${scenario}.${premise ? ' Premise: ' + premise : ''}

Required schema (match this structure exactly, filled with content appropriate to ${country} in ${year}):

${JSON.stringify(exampleJSON, null, 2)}

Rules:
- Use historically accurate leaders, formations, and context for ${country} in ${year}
- If scenario is alternate history or sandbox, you may deviate but stay grounded
- No anachronisms (no space assets before 1957, no cyber before 1980, etc — use empty arrays for categories that don't apply)
- Keep strings reasonably short so the full JSON fits in response limits

Remember: raw JSON only. First character: {  Last character: }`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4000,
          system: 'You are a JSON API. You respond with raw JSON objects and nothing else — no prose, no markdown, no explanation.',
          messages: [
            { role: 'user', content: userMsg },
          ],
        }),
      });

      const rawText = await res.text();
      setRawDebug(`STATUS: ${res.status}\n\nBODY:\n${rawText.slice(0, 1500)}`);

      let data;
      try { data = JSON.parse(rawText); }
      catch { throw new Error(`Response not JSON (status ${res.status})`); }

      if (data.error) throw new Error(`API: ${data.error.message || JSON.stringify(data.error)}`);
      if (!data.content) throw new Error('No content field');

      const text = data.content.map(c => c.text || '').join('');
      let state;
      try { state = extractJSON(text); }
      catch (e) {
        throw new Error(`JSON parse: ${e.message}. First 300 chars of response: ${text.slice(0, 300)}`);
      }

      if (!state.initial_events) state.initial_events = [];
      if (!state.military_units) state.military_units = { ground: [], naval: [], air: [], space: [], cbrn: [] };
      if (!state.allies) state.allies = [];
      if (!state.rivals) state.rivals = [];
      if (!state.key_concerns) state.key_concerns = [];

      const camp = {
        id: 'c_' + Date.now(),
        country, year, scenario, premise, turnDuration,
        theme: themeKey,
        state,
        turn: 1,
        history: state.initial_events.map(e => ({ date: state.date, type: 'world', text: e })),
        actionLog: [],
        knownWorldEvents: [],
        createdAt: Date.now(),
      };

      try {
        await window.storage.set('campaign:' + camp.id, JSON.stringify(camp));
      } catch {}
      onStart(camp);
    } catch (e) {
      setError('World generation failed: ' + (e.message || 'unknown error'));
      console.error('World gen error:', e);
    }
    setBuilding(false);
  };

  const theme = THEMES[pickTheme(country, year)];

  return (
    <div style={{
      minHeight: '100vh', background: theme.bg, color: theme.fg,
      fontFamily: theme.font, padding: '20px', position: 'relative',
    }}>
      {theme.scan && <ScanlineOverlay />}
      <CRTGlow color={theme.fg} />

      <div style={{ maxWidth: 900, margin: '0 auto', position: 'relative', zIndex: 2 }}>
        <div style={{ textAlign: 'center', marginBottom: 40, marginTop: 20 }}>
          <div style={{ fontSize: 11, letterSpacing: 6, opacity: 0.6, marginBottom: 8 }}>
            ▓▓ CLASSIFIED // EYES ONLY ▓▓
          </div>
          <h1 style={{
            fontFamily: theme.display, fontSize: 'clamp(36px, 7vw, 72px)',
            margin: 0, letterSpacing: 8, fontWeight: 900,
            textShadow: `0 0 20px ${theme.fg}, 0 0 40px ${theme.fg}44`,
          }}>
            GEOPOLITICS
          </h1>
          <div style={{ fontSize: 12, letterSpacing: 4, opacity: 0.7, marginTop: 8 }}>
            ◤ A SIMULATION OF STATECRAFT ◢
          </div>
        </div>

        <Panel theme={theme} title="▌ NEW CAMPAIGN">
          <Field theme={theme} label="NATION">
            <input value={country} onChange={e => setCountry(e.target.value)}
              placeholder="e.g. Soviet Union, France, Brazil..."
              style={inp(theme)} />
          </Field>

          <Field theme={theme} label={`YEAR: ${year}`}>
            <input type="range" min={1910} max={2026} value={year}
              onChange={e => setYear(parseInt(e.target.value))}
              style={{ width: '100%', accentColor: theme.fg }} />
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, opacity: 0.6 }}>
              <span>1910</span><span>1945</span><span>1985</span><span>2026</span>
            </div>
          </Field>

          <Field theme={theme} label="SCENARIO">
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
              {['historical', 'alternate history', 'sandbox'].map(s => (
                <button key={s} onClick={() => setScenario(s)}
                  style={btnChoice(theme, scenario === s)}>
                  {s.toUpperCase()}
                </button>
              ))}
            </div>
          </Field>

          <Field theme={theme} label="PREMISE / CAMPAIGN BRIEFING (optional)">
            <textarea value={premise} onChange={e => setPremise(e.target.value)}
              placeholder="e.g. Brezhnev has just died early and you are his successor facing unrest in Poland..."
              rows={3} style={inp(theme)} />
          </Field>

          <Field theme={theme} label="TURN DURATION">
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 6 }}>
              {['1 day','1 week','1 month','3 months'].map(t => (
                <button key={t} onClick={() => setTurnDuration(t)}
                  style={btnChoice(theme, turnDuration === t)}>
                  {t}
                </button>
              ))}
            </div>
          </Field>

          {error && <div style={{ color: theme.accent, padding: 10, border: `1px solid ${theme.accent}`, marginBottom: 16 }}>
            <div style={{ fontSize: 12 }}>⚠ {error}</div>
            {rawDebug && <pre style={{ marginTop: 8, fontSize: 10, maxHeight: 200, overflow: 'auto', opacity: 0.7, whiteSpace: 'pre-wrap' }}>{rawDebug}</pre>}
          </div>}

          <BuildingButton theme={theme} building={building} onClick={startGame} />
        </Panel>

        {saved.length > 0 && (
          <Panel theme={theme} title="▌ SAVED CAMPAIGNS">
            {saved.map(s => (
              <button key={s.key} onClick={() => onLoad(s.data)}
                style={{ ...btnChoice(theme, false), width: '100%', textAlign: 'left', marginBottom: 6, padding: 12 }}>
                <div style={{ fontWeight: 700 }}>{s.data.country} — {s.data.year}</div>
                <div style={{ fontSize: 11, opacity: 0.7 }}>
                  Turn {s.data.turn} • {s.data.scenario} • {s.data.state?.date || ''}
                </div>
              </button>
            ))}
          </Panel>
        )}

        <div style={{ textAlign: 'center', fontSize: 10, opacity: 0.4, marginTop: 20, letterSpacing: 2 }}>
          ▌▌ ALL NATIONS, PERSONS, AND EVENTS SIMULATED — FOR STRATEGIC STUDY ▌▌

function BuildingButton({ theme, building, onClick }) {
  const [elapsed, setElapsed] = useState(0);
  const [msgIdx, setMsgIdx] = useState(0);

  useEffect(() => {
    if (!building) { setElapsed(0); setMsgIdx(0); return; }
    const start = Date.now();
    const timer = setInterval(() => setElapsed(Math.floor((Date.now() - start) / 1000)), 500);
    const msgTimer = setInterval(() => setMsgIdx(i => i + 1), 2500);
    return () => { clearInterval(timer); clearInterval(msgTimer); };
  }, [building]);

  const messages = [
    'CONTACTING MAINFRAME',
    'CONSULTING HISTORICAL ARCHIVES',
    'COMPILING ORDER OF BATTLE',
    'BRIEFING DIPLOMATIC CORPS',
    'DECRYPTING INTEL REPORTS',
    'SYNTHESIZING WORLD STATE',
    'LOADING SITUATION ROOM',
  ];

  const dots = '▓'.repeat((elapsed % 4) + 1);
  const warn = elapsed > 90;

  if (!building) {
    return (
      <button onClick={onClick}
        style={{ ...btnPrimary(theme), width: '100%', padding: '18px', fontSize: 14, letterSpacing: 3 }}>
        ▶ COMMENCE SIMULATION
      </button>
    );
  }

  return (
    <div style={{
      background: theme.fg, color: theme.bg, padding: '18px',
      border: `1px solid ${theme.fg}`, width: '100%',
      boxShadow: `0 0 20px ${theme.fg}88`, position: 'relative', overflow: 'hidden',
    }}>
      <div style={{
        position: 'absolute', left: 0, top: 0, bottom: 0,
        width: `${Math.min((elapsed / 60) * 100, 100)}%`,
        background: theme.bg, opacity: 0.08, transition: 'width 0.5s linear',
      }} />
      <div style={{ position: 'relative', textAlign: 'center' }}>
        <div style={{ fontSize: 16, letterSpacing: 4, fontWeight: 700, marginBottom: 6 }}>
          {dots} GENERATING WORLD {dots}
        </div>
        <div style={{ fontSize: 11, letterSpacing: 2, opacity: 0.75 }}>
          ▸ {messages[msgIdx % messages.length]}...
        </div>
        <div style={{ fontSize: 10, letterSpacing: 3, opacity: 0.6, marginTop: 6 }}>
          T+{String(Math.floor(elapsed/60)).padStart(2,'0')}:{String(elapsed%60).padStart(2,'0')}
          {warn && ' ⚠ TAKING LONGER THAN EXPECTED'}
        </div>
      </div>
    </div>
  );
}

function LoadingScreen() {
  return <div style={{ background: '#0a0e0a', color: '#7fff7f', minHeight: '100vh',
    display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'monospace' }}>
    <div>▓▓▓ LOADING ▓▓▓</div>
  </div>;
}

// ============ GAME ============

function Game({ campaign, onExit, setCampaign }) {
  const theme = THEMES[campaign.theme] || THEMES.default;
  const [openDomain, setOpenDomain] = useState(null);
  const [openAction, setOpenAction] = useState(null);
  const [resolving, setResolving] = useState(false);
  const [resolution, setResolution] = useState(null);
  const [debugOpen, setDebugOpen] = useState(false);
  const [showMilitary, setShowMilitary] = useState(false);
  const [showBrief, setShowBrief] = useState(true);
  const [showActionLog, setShowActionLog] = useState(false);

  const save = async (c) => {
    setCampaign(c);
    try { await window.storage.set('campaign:' + c.id, JSON.stringify(c)); } catch {}
  };

  const availableDomains = Object.entries(DOMAINS).filter(([k, d]) => campaign.year + (campaign.turn - 1) >= d.minYear);

  const submitAction = async (domainKey, action, formData) => {
    setOpenAction(null);
    setOpenDomain(null);
    setResolving(true);

    const recentHist = campaign.history.slice(-20).map(h => `[${h.date}] ${h.text}`).join('\n');
    const currentYear = new Date(campaign.state.date).getFullYear();

    const prompt = `You are the game master for a geopolitical simulation. The player controls ${campaign.country} in ${campaign.state.date}. Scenario: ${campaign.scenario}. ${campaign.premise ? 'Premise: ' + campaign.premise : ''}

WORLD STATE:
- Player nation: ${campaign.state.player_country}
- Leader: ${campaign.state.leader}
- Allies: ${campaign.state.allies.join(', ')}
- Rivals: ${campaign.state.rivals.join(', ')}
- Military strength: ${campaign.state.military_strength}
- Nuclear status: ${campaign.state.nuclear_status}

RECENT HISTORY:
${recentHist}

PLAYER ACTION THIS TURN (${campaign.turnDuration}):
Domain: ${DOMAINS[domainKey].name}
Action: ${action.name}
Parameters: ${JSON.stringify(formData, null, 2)}

Resolve this turn. Advance the date by ${campaign.turnDuration}. Other major powers act autonomously and realistically. Events ripple. No anachronisms (year is ${currentYear}). Output ONLY valid JSON:

{
  "new_date": "YYYY-MM-DD (advanced by ${campaign.turnDuration})",
  "action_outcome": "3-5 sentence narrative of what happened with the player's action. Be specific, name people and places. Include complications.",
  "world_events": [
    {"date":"YYYY-MM-DD","type":"one of: military, diplomatic, economic, intelligence, domestic, crisis, incident","text":"specific event that happened elsewhere in the world this turn, 1-2 sentences, written as news brief. Include named actors."}
  ],
  "incidents": [
    {"type":"one of: aerial, naval, ground, reconnaissance, diplomatic, economic, cyber, space","text":"a specific notable incident this turn, 1-2 sentences"}
  ],
  "intel_received": "1-2 sentence intelligence assessment of what rivals appear to be doing, reflecting incomplete knowledge",
  "state_changes": {
    "allies_added": [], "allies_removed": [],
    "rivals_added": [], "rivals_removed": [],
    "new_military_strength": "only if changed, else null",
    "new_nuclear_status": "only if changed, else null"
  },
  "key_concerns": ["updated 3-5 strategic concerns"],
  "briefing": "2-3 sentence situation update for the player from their intelligence/cabinet"
}

Generate 3-6 world_events and 1-4 incidents. Make the world feel ALIVE. Include both positive and negative consequences of the player's action.

Output ONLY the JSON object. Start with { and end with }. No markdown fences, no prose.`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4000,
          system: 'You are a JSON API. You respond with raw JSON objects and nothing else — no prose, no markdown, no explanation.',
          messages: [
            { role: 'user', content: prompt },
          ],
        }),
      });
      const rawText = await res.text();
      let data;
      try { data = JSON.parse(rawText); } catch { throw new Error('Response not JSON'); }
      if (data.error) throw new Error(data.error.message || 'API error');
      if (!data.content) throw new Error('No content');
      const text = data.content.map(c => c.text || '').join('');
      const r = extractJSON(text);
      if (!r.world_events) r.world_events = [];
      if (!r.incidents) r.incidents = [];

      const newHistory = [
        ...campaign.history,
        { date: campaign.state.date, type: 'player', text: `[${DOMAINS[domainKey].name}] ${action.name}: ${r.action_outcome}` },
        ...r.world_events.map(e => ({ date: e.date, type: 'world', subtype: e.type, text: e.text })),
        ...r.incidents.map(i => ({ date: r.new_date, type: 'incident', subtype: i.type, text: i.text })),
      ];

      const newActionLog = [
        ...campaign.actionLog,
        { turn: campaign.turn, date: campaign.state.date, domain: DOMAINS[domainKey].name, action: action.name, params: formData, outcome: r.action_outcome },
      ];

      const sc = r.state_changes || {};
      const newState = {
        ...campaign.state,
        date: r.new_date,
        allies: [...campaign.state.allies.filter(a => !(sc.allies_removed || []).includes(a)), ...(sc.allies_added || [])],
        rivals: [...campaign.state.rivals.filter(a => !(sc.rivals_removed || []).includes(a)), ...(sc.rivals_added || [])],
        military_strength: sc.new_military_strength || campaign.state.military_strength,
        nuclear_status: sc.new_nuclear_status || campaign.state.nuclear_status,
        key_concerns: r.key_concerns || campaign.state.key_concerns,
      };

      const updated = {
        ...campaign, state: newState, turn: campaign.turn + 1,
        history: newHistory, actionLog: newActionLog,
      };

      setResolution(r);
      await save(updated);
    } catch (e) {
      setResolution({ error: 'Resolution failed: ' + (e.message || 'unknown') });
    }
    setResolving(false);
  };

  const triggerDebugEvent = async (desc) => {
    setDebugOpen(false);
    setResolving(true);

    const prompt = `You are the game master for a strategic simulation. Player nation: ${campaign.country}, date: ${campaign.state.date}. A scripted event has been triggered: "${desc}". Weave it into the world with a narrative of how it manifests, and note any related world events.

Output ONLY this JSON structure, no prose, no fences:

{
  "new_date": "${campaign.state.date}",
  "action_outcome": "3-4 sentence narrative",
  "world_events": [{"date": "${campaign.state.date}", "type": "crisis", "text": "..."}],
  "incidents": [],
  "intel_received": "...",
  "briefing": "..."
}

Start with { and end with }.`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 2000,
          system: 'You are a JSON API. You respond with raw JSON objects and nothing else — no prose, no markdown, no explanation.',
          messages: [
            { role: 'user', content: prompt },
          ],
        }),
      });
      const rawText = await res.text();
      let data;
      try { data = JSON.parse(rawText); } catch { throw new Error('Response not JSON'); }
      if (data.error) throw new Error(data.error.message || 'API error');
      if (!data.content) throw new Error('No content');
      const text = data.content.map(c => c.text || '').join('');
      const r = extractJSON(text);
      if (!r.world_events) r.world_events = [];
      if (!r.incidents) r.incidents = [];

      const newHistory = [
        ...campaign.history,
        { date: campaign.state.date, type: 'debug', text: `[DEBUG EVENT: ${desc}] ${r.action_outcome}` },
        ...r.world_events.map(e => ({ date: e.date, type: 'world', subtype: e.type, text: e.text })),
      ];
      const updated = { ...campaign, history: newHistory };
      setResolution(r);
      await save(updated);
    } catch (e) {
      setResolution({ error: 'Event trigger failed: ' + e.message });
    }
    setResolving(false);
  };

  return (
    <div style={{ background: theme.bg, color: theme.fg, fontFamily: theme.font,
      minHeight: '100vh', position: 'relative', overflow: 'hidden' }}>
      {theme.scan && <ScanlineOverlay />}
      <CRTGlow color={theme.fg} />

      {/* TOP BAR */}
      <div style={{
        position: 'relative', zIndex: 3,
        borderBottom: `1px solid ${theme.border}`,
        background: theme.panel, padding: '10px 16px',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 10,
      }}>
        <div>
          <div style={{ fontSize: 10, opacity: 0.6, letterSpacing: 2 }}>◤ SITREP ◢</div>
          <div style={{ fontFamily: theme.display, fontSize: 18, fontWeight: 700 }}>
            {campaign.state.player_country} • {campaign.state.date}
          </div>
        </div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <Stat theme={theme} label="TURN" value={campaign.turn} />
          <Stat theme={theme} label="LEADER" value={campaign.state.leader} small />
          <Stat theme={theme} label="FORCE" value={campaign.state.military_strength} small />
          <Stat theme={theme} label="NUKE" value={campaign.state.nuclear_status} small />
        </div>
        <div style={{ display: 'flex', gap: 6 }}>
          <button onClick={() => setShowMilitary(true)} style={btnSmall(theme)}>⚔ FORCES</button>
          <button onClick={() => setShowActionLog(true)} style={btnSmall(theme)}>⌖ LOG</button>
          <button onClick={() => setDebugOpen(true)} style={btnSmall(theme)}>⚠ DEBUG</button>
          <button onClick={onExit} style={btnSmall(theme)}>✕ EXIT</button>
        </div>
      </div>

      {/* MAIN LAYOUT */}
      <div style={{ display: 'grid', gridTemplateColumns: '220px 1fr', minHeight: 'calc(100vh - 70px)' }}>
        {/* DOMAIN SIDEBAR */}
        <div style={{ borderRight: `1px solid ${theme.border}`, background: theme.panel, padding: '12px 8px' }}>
          <div style={{ fontSize: 10, opacity: 0.6, letterSpacing: 3, marginBottom: 10, padding: '0 8px' }}>
            ▌ DOMAINS
          </div>
          {availableDomains.map(([k, d]) => (
            <button key={k} onClick={() => setOpenDomain(k)}
              style={{
                display: 'block', width: '100%', textAlign: 'left',
                padding: '10px 12px', marginBottom: 4,
                background: 'transparent', color: theme.fg,
                border: `1px solid ${theme.dim}`, fontFamily: theme.font,
                fontSize: 12, letterSpacing: 2, cursor: 'pointer',
                transition: 'all 0.15s',
              }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = theme.fg; e.currentTarget.style.background = theme.dim; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = theme.dim; e.currentTarget.style.background = 'transparent'; }}>
              <span style={{ marginRight: 8, color: theme.accent }}>{d.icon}</span>{d.name}
            </button>
          ))}
        </div>

        {/* MAP CENTER */}
        <div style={{ position: 'relative', padding: 16, display: 'flex', flexDirection: 'column', gap: 12 }}>
          {showBrief && campaign.state.starting_situation && (
            <div style={{ background: theme.panel, border: `1px solid ${theme.border}`, padding: 14, position: 'relative' }}>
              <div style={{ fontSize: 10, letterSpacing: 3, opacity: 0.6, marginBottom: 6 }}>▌ INITIAL BRIEFING</div>
              <div style={{ fontSize: 13, lineHeight: 1.6 }}>{campaign.state.starting_situation}</div>
              <button onClick={() => setShowBrief(false)}
                style={{ position: 'absolute', top: 6, right: 8, background: 'none', color: theme.fg, border: 'none', cursor: 'pointer', fontSize: 16 }}>×</button>
            </div>
          )}

          <div style={{ flex: 1, background: theme.panel, border: `1px solid ${theme.border}`, position: 'relative', minHeight: 400 }}>
            <div style={{ padding: '8px 14px', borderBottom: `1px solid ${theme.dim}`, fontSize: 10, letterSpacing: 3, opacity: 0.7, display: 'flex', justifyContent: 'space-between' }}>
              <span>▌ GLOBAL SITUATION MAP</span>
              <span>KEY CONCERNS: {campaign.state.key_concerns?.length || 0}</span>
            </div>
            <WorldMap theme={theme} campaign={campaign} />
            <MapLegend theme={theme} />
          </div>

          {/* BOTTOM ACTION LOG */}
          <div style={{ background: theme.panel, border: `1px solid ${theme.border}`, maxHeight: 180, overflow: 'auto' }}>
            <div style={{ padding: '8px 14px', borderBottom: `1px solid ${theme.dim}`, fontSize: 10, letterSpacing: 3, opacity: 0.7, display: 'flex', justifyContent: 'space-between' }}>
              <span>▌ ACTION LOG // RECENT TRANSMISSIONS</span>
              <span>{campaign.history.length} ENTRIES</span>
            </div>
            <div style={{ padding: 10, fontSize: 11, lineHeight: 1.6 }}>
              {campaign.history.slice(-6).reverse().map((h, i) => (
                <div key={i} style={{ marginBottom: 6, paddingLeft: 10, borderLeft: `2px solid ${historyColor(h.type, theme)}` }}>
                  <span style={{ opacity: 0.5, marginRight: 8 }}>[{h.date}]</span>
                  <span style={{ opacity: 0.6, marginRight: 6, color: historyColor(h.type, theme) }}>{(h.subtype || h.type).toUpperCase()}</span>
                  {h.text}
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* MODALS */}
      {openDomain && !openAction && (
        <DomainPanel theme={theme} domainKey={openDomain} year={new Date(campaign.state.date).getFullYear()}
          onClose={() => setOpenDomain(null)} onPick={(a) => setOpenAction(a)} />
      )}
      {openAction && (
        <ActionForm theme={theme} domainKey={openDomain} action={openAction}
          onClose={() => setOpenAction(null)}
          onSubmit={(data) => submitAction(openDomain, openAction, data)} />
      )}
      {resolving && <ResolvingOverlay theme={theme} />}
      {resolution && <ResolutionModal theme={theme} resolution={resolution} onClose={() => setResolution(null)} />}
      {showMilitary && <MilitaryModal theme={theme} state={campaign.state} onClose={() => setShowMilitary(false)} />}
      {showActionLog && <FullLogModal theme={theme} campaign={campaign} onClose={() => setShowActionLog(false)} />}
      {debugOpen && <DebugMenu theme={theme} onClose={() => setDebugOpen(false)} onTrigger={triggerDebugEvent} />}
    </div>
  );
}

function lookupCountryId(name) {
  if (!name) return null;
  const k = name.trim().toLowerCase();
  if (COUNTRY_ID_LOOKUP[k] !== undefined) return String(COUNTRY_ID_LOOKUP[k]);
  // Try partial matches
  for (const [key, id] of Object.entries(COUNTRY_ID_LOOKUP)) {
    if (k.includes(key) || key.includes(k)) return String(id);
  }
  return null;
}

function WorldMap({ theme, campaign }) {
  const [selected, setSelected] = useState(null);
  const [transform, setTransform] = useState({ x: 0, y: 0, scale: 1 });
  const svgRef = useRef(null);

  const W = 1000, H = 500;
  const countries = WORLD_COUNTRIES;

  const playerId = lookupCountryId(campaign.country);
  const allyIds = new Set((campaign.state.allies || []).map(lookupCountryId).filter(Boolean));
  const rivalIds = new Set((campaign.state.rivals || []).map(lookupCountryId).filter(Boolean));

  const handleWheel = (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    setTransform(t => ({ ...t, scale: Math.min(Math.max(t.scale * delta, 0.5), 8) }));
  };

  const [panning, setPanning] = useState(null);
  const handlePointerDown = (e) => {
    setPanning({ x: e.clientX, y: e.clientY, startX: transform.x, startY: transform.y });
  };
  const handlePointerMove = (e) => {
    if (!panning) return;
    setTransform(t => ({ ...t, x: panning.startX + (e.clientX - panning.x), y: panning.startY + (e.clientY - panning.y) }));
  };
  const handlePointerUp = () => setPanning(null);

  const resetView = () => setTransform({ x: 0, y: 0, scale: 1 });

  return (
    <div style={{ width: '100%', height: 'calc(100% - 36px)', minHeight: 360, position: 'relative', overflow: 'hidden', cursor: panning ? 'grabbing' : 'grab' }}>
      <svg
        ref={svgRef}
        viewBox={`0 0 ${W} ${H}`}
        style={{ width: '100%', height: '100%', display: 'block', touchAction: 'none' }}
        onWheel={handleWheel}
        onPointerDown={handlePointerDown}
            onPointerMove={handlePointerMove}
            onPointerUp={handlePointerUp}
            onPointerLeave={handlePointerUp}
          >
            <defs>
              <pattern id="mapgrid" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" stroke={theme.dim} strokeWidth="0.5" opacity="0.4" />
              </pattern>
              <filter id="mapglow">
                <feGaussianBlur stdDeviation="3" result="blur" />
                <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
              </filter>
            </defs>

            <g transform={`translate(${transform.x} ${transform.y}) scale(${transform.scale})`}>
              <rect width={W} height={H} fill="url(#mapgrid)" />

              {countries.map(c => {
                const isPlayer = c.id === playerId;
                const isAlly = allyIds.has(c.id);
                const isRival = rivalIds.has(c.id);
                const isSelected = selected === c.id;
                let fill = theme.dim, stroke = theme.border, op = 0.7, sw = 0.3;
                if (isPlayer) { fill = theme.fg; stroke = theme.fg; op = 0.85; sw = 0.5; }
                else if (isAlly) { fill = theme.fg; stroke = theme.fg; op = 0.35; sw = 0.3; }
                else if (isRival) { fill = theme.accent; stroke = theme.accent; op = 0.5; sw = 0.3; }
                if (isSelected) { sw = 1; stroke = theme.fg; }
                return (
                  <path key={c.id} d={c.d} fill={fill} stroke={stroke} strokeWidth={sw}
                    opacity={op} filter={isPlayer ? 'url(#mapglow)' : undefined}
                    style={{ cursor: 'pointer', transition: 'opacity 0.15s' }}
                    onClick={(e) => { e.stopPropagation(); setSelected(c.id === selected ? null : c.id); }}
                  />
                );
              })}

              {/* Crosshair on player capital or center */}
              {playerId && (() => {
                const pc = countries.find(c => c.id === playerId);
                if (!pc) return null;
                // Find centroid approx from path first coordinates
                const m = pc.d.match(/M([\d.]+),([\d.]+)/);
                if (!m) return null;
                const cx = parseFloat(m[1]), cy = parseFloat(m[2]);
                return (
                  <g>
                    <circle cx={cx} cy={cy} r={6 / transform.scale} fill="none" stroke={theme.fg} strokeWidth={1 / transform.scale} opacity="0.9" />
                    <circle cx={cx} cy={cy} r={12 / transform.scale} fill="none" stroke={theme.fg} strokeWidth={0.5 / transform.scale} opacity="0.5" />
                  </g>
                );
              })()}
            </g>
          </svg>

          {/* HUD overlays */}
          <div style={{ position: 'absolute', top: 8, right: 8, display: 'flex', flexDirection: 'column', gap: 4 }}>
            <button onClick={() => setTransform(t => ({ ...t, scale: Math.min(t.scale * 1.4, 8) }))}
              style={mapBtn(theme)}>+</button>
            <button onClick={() => setTransform(t => ({ ...t, scale: Math.max(t.scale * 0.7, 0.5) }))}
              style={mapBtn(theme)}>−</button>
            <button onClick={resetView} style={mapBtn(theme)}>⌖</button>
          </div>

          {selected && (
            <div style={{ position: 'absolute', top: 8, left: 8, background: theme.bg + 'ee',
              border: `1px solid ${theme.fg}`, padding: '6px 12px', fontSize: 11, letterSpacing: 2 }}>
              ▸ {countries.find(c => c.id === selected)?.name?.toUpperCase() || '---'}
            </div>
          )}
    </div>
  );
}

function ActionForm({ theme, domainKey, action, onClose, onSubmit }) {
  const [data, setData] = useState({});
  const [confirmed, setConfirmed] = useState(!action.irreversible);

  const set = (k, v) => setData(d => ({ ...d, [k]: v }));
  const canSubmit = action.fields.every(f => !f.required || (data[f.name] && data[f.name].toString().trim())) && confirmed;

  return (
    <Modal onClose={onClose} theme={theme}>
      <div style={{ padding: 22 }}>
        <div style={{ fontSize: 10, letterSpacing: 3, opacity: 0.6 }}>▌ {DOMAINS[domainKey].name} // ACTION ORDER</div>
        <h2 style={{ fontFamily: theme.display, fontSize: 24, margin: '6px 0 4px 0', letterSpacing: 3 }}>
          {action.name}
        </h2>
        {action.irreversible && (
          <div style={{ background: theme.accent + '22', border: `1px solid ${theme.accent}`,
            padding: 10, marginTop: 10, marginBottom: 10, fontSize: 11, letterSpacing: 1 }}>
            ⚠ IRREVERSIBLE ACTION — OUTCOMES CANNOT BE UNDONE
          </div>
        )}
        <div style={{ marginTop: 16 }}>
          {action.fields.map(f => (
            <Field key={f.name} theme={theme} label={f.label + (f.required ? ' *' : '')}>
              {f.type === 'text' && (
                <input value={data[f.name] || ''} onChange={e => set(f.name, e.target.value)} style={inp(theme)} />
              )}
              {f.type === 'textarea' && (
                <textarea rows={3} value={data[f.name] || ''} onChange={e => set(f.name, e.target.value)} style={inp(theme)} />
              )}
              {f.type === 'select' && (
                <select value={data[f.name] || ''} onChange={e => set(f.name, e.target.value)} style={inp(theme)}>
                  <option value="">-- select --</option>
                  {f.options.map(o => <option key={o} value={o}>{o}</option>)}
                </select>
              )}
            </Field>
          ))}
          {action.irreversible && (
            <label style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12, cursor: 'pointer', fontSize: 12 }}>
              <input type="checkbox" checked={confirmed} onChange={e => setConfirmed(e.target.checked)} />
              I understand this action is irreversible.
            </label>
          )}
        </div>
        <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
          <button onClick={onClose} style={{ ...btnChoice(theme, false), flex: 1 }}>▸ ABORT</button>
          <button onClick={() => onSubmit(data)} disabled={!canSubmit}
            style={{ ...btnPrimary(theme), flex: 2, opacity: canSubmit ? 1 : 0.4, cursor: canSubmit ? 'pointer' : 'not-allowed' }}>
            ▶ EXECUTE ORDER
          </button>
        </div>
      </div>
    </Modal>
  );
}

function ResolvingOverlay({ theme }) {
  const [tick, setTick] = useState(0);
  const [elapsed, setElapsed] = useState(0);
  useEffect(() => {
    const start = Date.now();
    const i = setInterval(() => setTick(t => t + 1), 400);
    const t = setInterval(() => setElapsed(Math.floor((Date.now() - start) / 1000)), 500);
    return () => { clearInterval(i); clearInterval(t); };
  }, []);
  const msgs = [
    'PROCESSING DIPLOMATIC CABLES',
    'CONSULTING JOINT CHIEFS',
    'CROSS-REFERENCING INTEL',
    'MODELING CASCADES',
    'AWAITING SIGINT',
    'DECRYPTING TRANSMISSIONS',
    'COMPILING SITREP',
  ];
  return (
    <div style={{
      position: 'fixed', inset: 0, background: theme.bg + 'ee',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      zIndex: 100, fontFamily: theme.font, color: theme.fg,
    }}>
      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 12, letterSpacing: 4, opacity: 0.6, marginBottom: 20 }}>
          ▓▓ RESOLVING TURN ▓▓
        </div>
        <div style={{ fontFamily: theme.display, fontSize: 32, letterSpacing: 6, marginBottom: 20 }}>
          {'◤◢'.repeat(Math.min(tick % 6 + 1, 6))}
        </div>
        <div style={{ fontSize: 12, opacity: 0.7, letterSpacing: 2 }}>
          ▸ {msgs[tick % msgs.length]}...
        </div>
        <div style={{ fontSize: 10, letterSpacing: 3, opacity: 0.5, marginTop: 12 }}>
          T+{String(Math.floor(elapsed/60)).padStart(2,'0')}:{String(elapsed%60).padStart(2,'0')}
          {elapsed > 90 && ' ⚠'}
        </div>
      </div>
    </div>
  );
}

      }}>
        <button onClick={onClose} style={{
          position: 'absolute', top: 8, right: 10, background: 'none', border: 'none',
          color: theme.fg, fontSize: 18, cursor: 'pointer', zIndex: 1,
        }}>×</button>
        {children}
      </div>
    </div>
  );
}

function Panel({ theme, title, children }) {
  return (
    <div style={{ background: theme.panel, border: `1px solid ${theme.border}`, padding: 20, marginBottom: 20 }}>
      <div style={{ fontSize: 11, letterSpacing: 3, marginBottom: 16, opacity: 0.8 }}>{title}</div>
      {children}
    </div>
  );
}

function Field({ theme, label, children }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontSize: 10, letterSpacing: 2, opacity: 0.7, marginBottom: 6 }}>▸ {label}</div>
      {children}
    </div>
  );
}

function Stat({ theme, label, value, small }) {
  return (
    <div style={{ minWidth: small ? 'auto' : 70, borderLeft: `2px solid ${theme.accent}`, paddingLeft: 8 }}>
      <div style={{ fontSize: 8, letterSpacing: 2, opacity: 0.6 }}>{label}</div>
      <div style={{ fontSize: small ? 11 : 14, fontWeight: 700, maxWidth: 140, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{value}</div>
    </div>
  );
}

function Section({ theme, label, children }) {
  return (
    <div style={{ background: theme.bg, border: `1px solid ${theme.dim}`, padding: 12 }}>
      <div style={{ fontSize: 10, letterSpacing: 2, color: theme.accent, marginBottom: 6 }}>▸ {label}</div>
      <div>{children}</div>
    </div>
  );
}

function ScanlineOverlay() {
  return (
    <div style={{
      position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 1,
      background: 'repeating-linear-gradient(0deg, transparent 0, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 3px)',
    }} />
  );
}

function CRTGlow({ color }) {
  return (
    <div style={{
      position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 0,
      background: `radial-gradient(ellipse at center, ${color}08 0%, transparent 70%)`,
    }} />
  );
}

// ============ STYLE HELPERS ============

const inp = (t) => ({
  background: t.bg, color: t.fg, border: `1px solid ${t.border}`,
  padding: '8px 10px', width: '100%', fontFamily: t.font, fontSize: 13,
  outline: 'none', letterSpacing: 0.5, boxSizing: 'border-box',
});

const btnChoice = (t, active) => ({
  background: active ? t.fg : 'transparent',
  color: active ? t.bg : t.fg,
  border: `1px solid ${active ? t.fg : t.dim}`,
  padding: '8px 12px', fontFamily: t.font, fontSize: 11,
  letterSpacing: 1.5, cursor: 'pointer', transition: 'all 0.15s',
});

const btnPrimary = (t) => ({
  background: t.fg, color: t.bg, border: `1px solid ${t.fg}`,
  padding: '12px 16px', fontFamily: t.font, fontSize: 13, fontWeight: 700,
  letterSpacing: 3, cursor: 'pointer', boxShadow: `0 0 15px ${t.fg}55`,
});

const btnSmall = (t) => ({
  background: 'transparent', color: t.fg, border: `1px solid ${t.border}`,
  padding: '6px 10px', fontFamily: t.font, fontSize: 10,
  letterSpacing: 2, cursor: 'pointer',
});

function historyColor(type, theme) {
  const map = {
    player: theme.fg, world: theme.fg, incident: theme.accent, debug: theme.accent,
    military: theme.accent, crisis: theme.accent, diplomatic: theme.fg,
    economic: theme.fg, intelligence: theme.fg, domestic: theme.fg,
  };
  return map[type] || theme.fg;
}
